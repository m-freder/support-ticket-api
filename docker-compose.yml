services:
  postgres:
    image: postgres:16
    container_name: support-ticket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: support_ticket_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support_ticket_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
